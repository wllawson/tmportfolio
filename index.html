<!DOCTYPE html>
<script type="application/json" id="cowork-artifact-meta">
{
  "name": "Tm Portfolio Tracker",
  "schemaVersion": 1,
  "description": "Live interactive tracker for the 2026 Talent Management Portfolio. Fetches all 56 projects from Asana on load, with filter tabs (All / On Track / On Hold / At Risk / Complete), search by name or owner, color-coded status cards, and direct links back to Asana.",
  "mcpTools": [
    "mcp__89294982-21e6-4cb5-b1d1-6b92f453495f__get_items_for_portfolio"
  ],
  "mcpServerNames": [
    "Asana"
  ]
}
</script>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Talent Management Portfolio</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f7;
    color: #1d1d1f;
    min-height: 100vh;
  }

  header {
    background: #fff;
    border-bottom: 1px solid #e5e5e7;
    padding: 20px 24px 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .portfolio-title {
    font-size: 20px;
    font-weight: 700;
    color: #1d1d1f;
    letter-spacing: -0.3px;
  }

  .portfolio-subtitle {
    font-size: 13px;
    color: #6e6e73;
    margin-top: 2px;
  }

  .last-updated {
    font-size: 12px;
    color: #6e6e73;
    background: #f5f5f7;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid #e5e5e7;
    white-space: nowrap;
  }

  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
  }

  .search-wrap input {
    width: 220px;
    padding: 7px 12px 7px 32px;
    border: 1px solid #d2d2d7;
    border-radius: 8px;
    font-size: 13px;
    background: #f5f5f7;
    color: #1d1d1f;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-wrap input:focus {
    border-color: #0071e3;
    background: #fff;
  }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: #6e6e73;
    font-size: 13px;
    pointer-events: none;
  }

  .filter-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid #d2d2d7;
    background: #fff;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    color: #3c3c43;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }

  .filter-btn .count {
    background: #e5e5ea;
    color: #6e6e73;
    border-radius: 10px;
    padding: 1px 6px;
    font-size: 11px;
    font-weight: 600;
  }

  .filter-btn.active {
    border-color: transparent;
    color: #fff;
  }

  .filter-btn.active .count { background: rgba(255,255,255,0.25); color: #fff; }

  .filter-btn[data-status="all"].active { background: #1d1d1f; }
  .filter-btn[data-status="on_track"].active { background: #34c759; }
  .filter-btn[data-status="on_hold"].active { background: #ff9f0a; }
  .filter-btn[data-status="at_risk"].active { background: #ff3b30; }
  .filter-btn[data-status="complete"].active { background: #8e8e93; }

  .filter-btn:not(.active):hover {
    background: #f5f5f7;
    border-color: #b8b8bd;
  }

  .stats-bar {
    display: flex;
    gap: 8px;
    padding: 12px 24px;
    background: #fff;
    border-bottom: 1px solid #e5e5e7;
    flex-wrap: wrap;
  }

  .stat-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #3c3c43;
    background: #f5f5f7;
    padding: 4px 12px;
    border-radius: 20px;
  }

  .stat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-on_track { background: #34c759; }
  .dot-on_hold { background: #ff9f0a; }
  .dot-at_risk { background: #ff3b30; }
  .dot-complete { background: #8e8e93; }
  .dot-total { background: #0071e3; }

  .stat-chip strong { font-weight: 600; }

  main {
    padding: 20px 24px 32px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: #6e6e73;
    margin: 20px 0 10px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 12px;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e5e5e7;
    padding: 16px;
    cursor: pointer;
    transition: box-shadow 0.15s, transform 0.1s;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }

  .card.status-on_track::before { background: #34c759; }
  .card.status-on_hold::before { background: #ff9f0a; }
  .card.status-at_risk::before { background: #ff3b30; }
  .card.status-complete::before { background: #8e8e93; }

  .card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    transform: translateY(-1px);
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }

  .card-name {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.35;
    color: #1d1d1f;
    flex: 1;
  }

  .status-badge {
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .badge-on_track { background: #d1f5dc; color: #1a7f37; }
  .badge-on_hold { background: #fff3cd; color: #955c00; }
  .badge-at_risk { background: #ffe0de; color: #c0392b; }
  .badge-complete { background: #ebebed; color: #5a5a5e; }

  .card-owner {
    font-size: 12px;
    color: #6e6e73;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .owner-avatar {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #0071e3;
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    text-transform: uppercase;
  }

  .card-status-title {
    font-size: 11.5px;
    color: #3c3c43;
    line-height: 1.4;
    font-weight: 500;
  }

  .card-status-text {
    font-size: 11px;
    color: #6e6e73;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: auto;
    padding-top: 8px;
    border-top: 1px solid #f0f0f2;
  }

  .card-date {
    font-size: 11px;
    color: #8e8e93;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .asana-link {
    font-size: 11px;
    color: #0071e3;
    font-weight: 500;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .asana-link:hover { text-decoration: underline; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #8e8e93;
  }

  .empty-state .icon { font-size: 36px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: #8e8e93;
    font-size: 14px;
  }

  .spinner {
    width: 24px;
    height: 24px;
    border: 2.5px solid #e5e5e7;
    border-top-color: #0071e3;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .no-results { display: none; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="portfolio-title">2026 Talent Management Portfolio</div>
      <div class="portfolio-subtitle">Live project tracker · Synced from Asana</div>
    </div>
    <div class="last-updated" id="lastUpdated">Loading…</div>
  </div>
  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search projects…" oninput="applyFilters()">
    </div>
    <div class="filter-tabs">
      <button class="filter-btn active" data-status="all" onclick="setFilter('all')">All <span class="count" id="cnt-all">–</span></button>
      <button class="filter-btn" data-status="on_track" onclick="setFilter('on_track')">On Track <span class="count" id="cnt-on_track">–</span></button>
      <button class="filter-btn" data-status="on_hold" onclick="setFilter('on_hold')">On Hold <span class="count" id="cnt-on_hold">–</span></button>
      <button class="filter-btn" data-status="at_risk" onclick="setFilter('at_risk')">At Risk <span class="count" id="cnt-at_risk">–</span></button>
      <button class="filter-btn" data-status="complete" onclick="setFilter('complete')">Complete <span class="count" id="cnt-complete">–</span></button>
    </div>
  </div>
</header>

<div class="stats-bar" id="statsBar" style="display:none">
  <div class="stat-chip"><span class="stat-dot dot-total"></span><strong id="s-total">0</strong> total projects</div>
  <div class="stat-chip"><span class="stat-dot dot-on_track"></span><strong id="s-on_track">0</strong> on track</div>
  <div class="stat-chip"><span class="stat-dot dot-on_hold"></span><strong id="s-on_hold">0</strong> on hold</div>
  <div class="stat-chip"><span class="stat-dot dot-at_risk"></span><strong id="s-at_risk">0</strong> at risk</div>
  <div class="stat-chip"><span class="stat-dot dot-complete"></span><strong id="s-complete">0</strong> complete</div>
</div>

<main id="main">
  <div class="loading">
    <div class="spinner"></div>
    Fetching projects from Asana…
  </div>
</main>

<script>
let allProjects = [];
let activeFilter = 'all';

function getInitials(name) {
  if (!name) return '?';
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function getAvatarColor(name) {
  const colors = ['#0071e3','#5856d6','#ff2d55','#ff9f0a','#34c759','#00c7be','#30b0c7'];
  if (!name) return colors[0];
  let h = 0;
  for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  return colors[Math.abs(h) % colors.length];
}

function formatDate(d) {
  if (!d) return null;
  const [y, m, day] = d.split('-');
  return new Date(y, m - 1, day).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function cleanText(t) {
  if (!t) return '';
  // Strip URLs and dashes lines, trim
  return t
    .replace(/https?:\/\/\S+/g, '')
    .replace(/[-]{20,}/g, '')
    .replace(/\n{3,}/g, '\n\n')
    .trim()
    .slice(0, 200);
}

function statusLabel(s) {
  const map = { on_track: 'On Track', on_hold: 'On Hold', at_risk: 'At Risk', complete: 'Complete' };
  return map[s] || s || 'Unknown';
}

function renderProjects(projects) {
  const counts = { all: 0, on_track: 0, on_hold: 0, at_risk: 0, complete: 0 };
  allProjects.forEach(p => {
    counts.all++;
    const s = p.current_status_update?.status_type || (p.completed ? 'complete' : 'on_track');
    if (counts[s] !== undefined) counts[s]++;
  });

  ['all', 'on_track', 'on_hold', 'at_risk', 'complete'].forEach(k => {
    const el = document.getElementById('cnt-' + k);
    if (el) el.textContent = counts[k];
  });

  document.getElementById('s-total').textContent = counts.all;
  document.getElementById('s-on_track').textContent = counts.on_track;
  document.getElementById('s-on_hold').textContent = counts.on_hold;
  document.getElementById('s-at_risk').textContent = counts.at_risk;
  document.getElementById('s-complete').textContent = counts.complete;
  document.getElementById('statsBar').style.display = 'flex';

  const now = new Date().toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
  document.getElementById('lastUpdated').textContent = 'Updated ' + now;

  applyFilters();
}

function applyFilters() {
  const query = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const filtered = allProjects.filter(p => {
    const status = p.current_status_update?.status_type || (p.completed ? 'complete' : 'on_track');
    const matchStatus = activeFilter === 'all' || status === activeFilter;
    const matchSearch = !query || p.name.toLowerCase().includes(query) ||
      (p.owner?.name || '').toLowerCase().includes(query);
    return matchStatus && matchSearch;
  });

  buildGrid(filtered);
}

function buildGrid(projects) {
  const main = document.getElementById('main');

  if (projects.length === 0) {
    main.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>No projects match your filters.</p></div>`;
    return;
  }

  // Group active vs complete
  const active = projects.filter(p => {
    const s = p.current_status_update?.status_type || (p.completed ? 'complete' : 'on_track');
    return s !== 'complete';
  });
  const complete = projects.filter(p => {
    const s = p.current_status_update?.status_type || (p.completed ? 'complete' : 'on_track');
    return s === 'complete';
  });

  let html = '';

  if (active.length > 0) {
    if (activeFilter === 'all') html += `<div class="section-label">Active Projects (${active.length})</div>`;
    html += `<div class="grid">${active.map(cardHTML).join('')}</div>`;
  }

  if (complete.length > 0) {
    html += `<div class="section-label">Completed (${complete.length})</div>`;
    html += `<div class="grid">${complete.map(cardHTML).join('')}</div>`;
  }

  main.innerHTML = html;
}

function cardHTML(p) {
  const raw = p.current_status_update?.status_type;
  const status = raw || (p.completed ? 'complete' : 'on_track');
  const ownerName = p.owner?.name || 'Unassigned';
  const initials = getInitials(ownerName);
  const avatarColor = getAvatarColor(ownerName);
  const statusTitle = p.current_status_update?.title || '';
  const statusText = cleanText(p.current_status_update?.text || '');
  const url = p.permalink_url || '#';
  const due = formatDate(p.due_on);

  // Extract just the summary from status text if it has sections
  const summaryMatch = statusText.match(/Summary\s*\n+([\s\S]{10,200})/i);
  const displayText = summaryMatch ? summaryMatch[1].trim().slice(0, 160) : statusText.slice(0, 160);

  return `
  <a class="card status-${status}" href="${url}" target="_blank" rel="noopener">
    <div class="card-header">
      <div class="card-name">${escHtml(p.name)}</div>
      <span class="status-badge badge-${status}">${statusLabel(status)}</span>
    </div>
    <div class="card-owner">
      <span class="owner-avatar" style="background:${avatarColor}">${initials}</span>
      ${escHtml(ownerName)}
    </div>
    ${displayText ? `<div class="card-status-text">${escHtml(displayText)}${displayText.length >= 160 ? '…' : ''}</div>` : ''}
    <div class="card-footer">
      <span class="card-date">${due ? '📅 Due ' + due : ''}</span>
      <span class="asana-link">View in Asana ↗</span>
    </div>
  </a>`;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function setFilter(status) {
  activeFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.status === status);
  });
  applyFilters();
}

async function loadData() {
  try {
    const result = await window.cowork.callMcpTool(
      'mcp__89294982-21e6-4cb5-b1d1-6b92f453495f__get_items_for_portfolio',
      {
        portfolio_gid: '1211711951843452',
        opt_fields: 'name,current_status_update,current_status_update.status_type,current_status_update.text,current_status_update.title,due_on,start_on,owner,owner.name,permalink_url,completed',
        limit: 100
      }
    );

    const data = typeof result === 'string' ? JSON.parse(result) : result;
    allProjects = (data.data || []).sort((a, b) => {
      // Sort: active first, then complete; within active by status
      const order = { at_risk: 0, on_hold: 1, on_track: 2, complete: 3 };
      const sa = a.current_status_update?.status_type || (a.completed ? 'complete' : 'on_track');
      const sb = b.current_status_update?.status_type || (b.completed ? 'complete' : 'on_track');
      return (order[sa] ?? 2) - (order[sb] ?? 2) || a.name.localeCompare(b.name);
    });

    renderProjects(allProjects);
  } catch (err) {
    document.getElementById('main').innerHTML = `
      <div class="empty-state">
        <div class="icon">⚠️</div>
        <p>Could not load projects. Make sure your Asana connector is connected.</p>
        <p style="margin-top:8px;font-size:12px;color:#aaa">${escHtml(String(err))}</p>
      </div>`;
  }
}

loadData();
</script>
</body>
</html>
